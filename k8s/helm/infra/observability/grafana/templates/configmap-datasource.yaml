apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-configmap-datasource
data:
  datasource.yaml: |
    apiVersion: 1

    datasources:
    - name: Prometheus
      type: prometheus
      uid: prometheus
      access: proxy
      orgId: 1
      url: http://prometheus.infra-observability.svc.cluster.local:9090
      basicAuth: false
      isDefault: true
      version: 1
      editable: false
      jsonData:
        httpMethod: GET

    - name: Loki
      type: loki
      url: http://loki.infra-observability.svc.cluster.local:3100
      access: proxy
      editable: true

    - name: Tempo
      type: tempo
      access: proxy
      orgId: 1
      url: http://tempo.infra-observability.svc.cluster.local:3200
      basicAuth: false
      isDefault: false
      version: 1
      editable: false
      apiVersion: 1
      uid: tempo
      jsonData:
        httpMethod: GET
        serviceMap:
          datasourceUid: prometheus