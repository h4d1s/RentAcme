apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
data:
  prometheus-config.yaml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s
    scrape_configs:
      - job_name: 'otel-collector'
        static_configs:
          - targets: ['otel-collector.infra-observability.svc.cluster.local:8888']
      - job_name: 'tempo'
        static_configs:
          - targets: [ 'tempo.infra-observability.svc.cluster.local:3200' ]