apiVersion: v1
kind: Secret
metadata:
  name: {{ include "saga-orchestration-statemachine.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  ConnectionStrings__RabbitMQ: {{ .Values.secrets.ConnectionStrings__RabbitMQ | quote }}
  ConnectionStrings__SagaMachineContext: {{ .Values.secrets.ConnectionStrings__SagaMachineContext | quote }}
  KEYCLOAK_BACKEND_SECRET: {{ .Values.secrets.KEYCLOAK_BACKEND_SECRET | quote }}