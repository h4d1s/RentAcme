apiVersion: v1
kind: Secret
metadata:
  name: {{ include "reservation-api.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  ConnectionStrings__RabbitMQ: {{ .Values.secrets.ConnectionStrings__RabbitMQ | quote }}
  ConnectionStrings__ReservationDbContext: {{ .Values.secrets.ConnectionStrings__ReservationDbContext | quote }}
  ConnectionStrings__Redis: {{ .Values.secrets.ConnectionStrings__Redis | quote }}
  KEYCLOAK_BACKEND_SECRET: {{ .Values.secrets.KEYCLOAK_BACKEND_SECRET | quote }}