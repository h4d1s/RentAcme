services:
  rabbitmq:
    image: rabbitmq:management
    networks: 
      - rentacme_network

  mailhog:
    image: mailhog/mailhog:latest
    networks:
      - rentacme_network

  otel-collector:
    image: otel/opentelemetry-collector-contrib
    networks:
      - rentacme_network

  prometheus:
    image: prom/prometheus
    networks: 
      - rentacme_network

  grafana:
    image: grafana/grafana
    networks: 
      - rentacme_network

  loki:
    image: grafana/loki:latest
    networks:
      - rentacme_network

  tempo:
    image: grafana/tempo:2.10.4
    networks:
      - rentacme_network

  keycloak-db:
    image: postgres:latest
    networks: 
      - rentacme_network

  keycloak:
    image: quay.io/keycloak/keycloak
    networks: 
      - rentacme_network

  api-gateway:
    image: ${DOCKER_REGISTRY-}api-gateway
    build:
      context: .
      dockerfile: Gateways/APIGateway/Dockerfile
    networks:
      - rentacme_network

  user-api-db:
    image: postgres:latest
    networks: 
      - rentacme_network

  user-api:
    image: ${DOCKER_REGISTRY-}user-api
    build:
      context: .
      dockerfile: Services/User/User.API/Dockerfile
    networks: 
      - rentacme_network

  inventory-api-db:
    image: postgres:latest
    networks: 
      - rentacme_network

  inventory-api:
    image: ${DOCKER_REGISTRY-}inventory-api
    build:
      context: .
      dockerfile: Services/Inventory/Inventory.API/Dockerfile
    networks: 
      - rentacme_network

  reservation-api-db:
    image: postgres:latest
    networks: 
      - rentacme_network

  reservation-api:
    image: ${DOCKER_REGISTRY-}reservation-api
    build:
      context: .
      dockerfile: Services/Reservation/Reservation.API/Dockerfile
    networks: 
      - rentacme_network

  notification-api:
    image: ${DOCKER_REGISTRY-}notification-api
    build:
      context: .
      dockerfile: Services/Notification/Notification.API/Dockerfile
    networks: 
      - rentacme_network

  payment-api:
    image: ${DOCKER_REGISTRY-}payment-api
    build:
      context: .
      dockerfile: Services/Payment/Payment.API/Dockerfile
    networks:
      - rentacme_network

  saga-orchestration-statemachine-db:
    image: postgres:latest
    networks: 
      - rentacme_network

  saga-orchestration-statemachine:
    image: ${DOCKER_REGISTRY-}saga-orchestration-statemachine
    build:
      context: .
      dockerfile: StateMachines/SagaOrchestrationStateMachine/Dockerfile
    networks:
      - rentacme_network

networks:
  rentacme_network: