name: rent-acme

services:
  rabbitmq:
    container_name: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=rentacme
      - RABBITMQ_DEFAULT_PASS=Passw0rd!
    ports:
      - 5672:5672
      - 15672:15672

  mailhog:
    container_name: mailhog
    ports:
      - 1025:1025
      - 8025:8025

  consul:
    container_name: consul
    ports:
      - 8500:8500

  keycloak-db:
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: rent-acme
      POSTGRES_PASSWORD: Passw0rd!
    ports:
      - 5410:5432 

  keycloak:
    container_name: keycloak
    environment:
    - KC_DB=postgres
    - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak_db
    - KC_DB_USERNAME=rent-acme
    - KC_DB_PASSWORD=Passw0rd!
    - KC_BOOTSTRAP_ADMIN_USERNAME=admin
    - KC_BOOTSTRAP_ADMIN_PASSWORD=Passw0rd!
    - KK_TO_RMQ_URL=rabbitmq
    - KK_TO_RMQ_PORT=5672
    - KK_TO_RMQ_USERNAME=rentacme
    - KK_TO_RMQ_PASSWORD=Passw0rd!
    - KK_TO_RMQ_EXCHANGE=amq.topic
    - KK_TO_RMQ_VHOST=/
    - KC_OTEL=true
    - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    - OTEL_LOGS_EXPORTER=otlp
    - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    ports:
      - 8080:8080
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./BuildingBlocks/configs/keycloak/realm-rent-acme.json:/opt/keycloak/data/import/realm-rent-acme.json
      - ./BuildingBlocks/configs/keycloak/keycloak-to-rabbit-3.0.5.jar:/opt/keycloak/providers/keycloak-to-rabbit-3.0.5.jar
    depends_on:
      - keycloak-db
      - otel-collector
      - mailhog

  prometheus:
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --enable-feature=otlp-write-receiver
    ports:
      - 9090:9090
    restart: unless-stopped
    volumes:
      - ./BuildingBlocks/configs/prometheus:/etc/prometheus
    depends_on:
      - consul

  grafana:
    container_name: grafana
    ports:
      - 3000:3000
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=grafana
    volumes:
      - ./BuildingBlocks/configs/grafana:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus

  loki:
    container_name: loki
    ports:
      - 3100:3100
    command:
      - -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./BuildingBlocks/configs/loki/loki.yml:/etc/loki/local-config.yaml
    depends_on:
      - grafana

  tempo:
    container_name: tempo
    command:
      - -target=all
      - -config.file=/etc/tempo.yaml
    volumes:
      - ./BuildingBlocks/configs/tempo/tempo.yml:/etc/tempo.yaml
    ports:
      - 3200:3200 # tempo
      - 4317:4317 # Tempo OTLP GRPC
      - 4318:4318 # Tempo OTLP HTTP
    depends_on:
      - grafana

  otel-collector:
    container_name: otel-collector
    command: 
      - --config=/etc/otel-collector.yml
    volumes:
      - ./BuildingBlocks/configs/otel-collector/otel-collector.yml:/etc/otel-collector.yml
    ports:
      - 1888:1888 # pprof extension
      - 8888:8888 # Prometheus metrics exposed by the Collector
      - 8889:8889 # Prometheus exporter metrics
      - 13133:13133 # health_check extension
      - 4317:4317 # OTLP gRPC receiver
      # - 4318:4318 # OTLP http receiver
      - 55679:55679 # zpages extension
    depends_on:
      - prometheus
      - grafana
      - loki
      - tempo

  api-gateway:
    container_name: api-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
    ports:
      - 5000:8080
      - 5001:8081
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
    depends_on:
      - user-api
      - inventory-api
      - reservation-api

  user-api-db:
    container_name: user-api-db
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: rent-acme
      POSTGRES_PASSWORD: Passw0rd!
    ports:
      - 5420:5432

  user-api:
    container_name: user-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
    ports:
      - 5211:8080
      - 5212:8081
    depends_on:
      - consul
      - user-api-db
      - rabbitmq
      - keycloak 

  inventory-api-db:
    container_name: inventory-api-db
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: rent-acme
      POSTGRES_PASSWORD: Passw0rd!
    ports:
      - 5430:5432

  inventory-api:
    container_name: inventory-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
    ports:
      - 5221:8080
      - 5222:8081
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
    depends_on:
      - consul
      - inventory-api-db
      - rabbitmq

  reservation-api-db:
    container_name: reservation-api-db
    environment:
      POSTGRES_DB: reservation_db
      POSTGRES_USER: rent-acme
      POSTGRES_PASSWORD: Passw0rd!
    ports:
      - 5440:5432

  reservation-api:
    container_name: reservation-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080 
      - ASPNETCORE_HTTPS_PORTS=8081
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
    ports:
      - 5231:8080
      - 5332:8081
    depends_on:
      - consul
      - reservation-api-db
      - rabbitmq

  notification-api:
    container_name: notification-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
    ports:
      - 5241:8080
      - 5242:8081
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
    depends_on:
      - consul
      - rabbitmq 

  payment-api:
    container_name: payment-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
    ports:
      - 5251:8080
      - 5252:8081
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro
    depends_on:
      - consul
      - rabbitmq

  saga-orchestration-statemachine-db:
    container_name: saga-orchestration-statemachine-db
    environment:
      POSTGRES_DB: saga_machine_db
      POSTGRES_USER: rent-acme
      POSTGRES_PASSWORD: Passw0rd!
    ports:
      - 5450:5432

  saga-orchestration-statemachine:
    container_name: saga-orchestration-statemachine
    environment:
      - DOTNET_ENVIRONMENT=Development
    depends_on:
      - consul
      - saga-orchestration-statemachine-db
      - rabbitmq
