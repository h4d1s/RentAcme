receivers:
  otlp:
    protocols:
      grpc:

processors:
  batch:

exporters:
  debug:
    verbosity: detailed
  otlp_http/tempo:
    endpoint: "http://tempo:4318"
    tls:
      insecure: true
  otlp_http/loki:
    endpoint: "http://loki:3100/otlp"
    tls:
      insecure: true
  prometheus:
    endpoint: "0.0.0.0:8889"

extensions:
  health_check:
  pprof:
  zpages:

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp_http/tempo]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp_http/loki]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, prometheus]