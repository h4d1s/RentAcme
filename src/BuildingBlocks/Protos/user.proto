syntax = "proto3";

package userproto;

service UserProtoService {
	rpc GetUser(GetUserRequest) returns (GetUserResponse) {}
	rpc GetUserByExternalId(GetUserByExternalIdRequest) returns (GetUserByExternalIdResponse) {}
	rpc CheckUser(CheckUserRequest) returns (UserStatusResponse) {}
}

// Get User
message GetUserRequest {
	string user_id = 1;
}
message GetUserResponse {
    string id = 1;
	string externalId = 2;
    string first_name = 3;
	string last_name = 4;
    string email = 5;
}

// Get User By External Id
message GetUserByExternalIdRequest {
	string user_external_id = 1;
}
message GetUserByExternalIdResponse {
    string id = 1;
	string externalId = 2;
    string first_name = 3;
	string last_name = 4;
    string email = 5;
}

// Check User
message CheckUserRequest {
	string user_id = 1;
}
message UserStatusResponse {
	bool is_exists = 1;
}